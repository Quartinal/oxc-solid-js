name: CI
env:
  DEBUG: napi:*
  APP_NAME: oxc-jsx-dom-expressions
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_INCREMENTAL: "1"
permissions:
  contents: write
  id-token: write
"on":
  push:
    branches:
      - main
    tags:
      - "v*"
      - "v*-*"
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
  pull_request: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install dependencies
        run: pnpm install
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm build --target x86_64-apple-darwin
          - host: windows-latest
            build: pnpm build --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm build --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm build --target aarch64-apple-darwin
    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.15.2
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: pnpm install
      - name: Setup node x86
        uses: actions/setup-node@v6
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 22
          cache: pnpm
          architecture: x86
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Pack release tarball
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        run: |
          set -euo pipefail
          node_file="$(ls *.node | head -n 1)"
          mkdir -p dist
          target="${{ matrix.settings.target }}"
          version="$(node -p "require('./package.json').version")"

          os=""
          cpu=""
          libc=""
          case "$target" in
            x86_64-unknown-linux-gnu)
              os="linux"
              cpu="x64"
              libc="glibc"
              ;;
            x86_64-pc-windows-msvc)
              os="win32"
              cpu="x64"
              ;;
            x86_64-apple-darwin)
              os="darwin"
              cpu="x64"
              ;;
            aarch64-apple-darwin)
              os="darwin"
              cpu="arm64"
              ;;
            *)
              echo "Unsupported target for release tarball metadata: $target" >&2
              exit 1
              ;;
          esac

          package_dir="dist/target-package"
          mkdir -p "$package_dir"

          cp "$node_file" "$package_dir/"

          if [ -n "$libc" ]; then
            node -e "
              const fs = require('fs');
              const pkg = {
                name: '@oxc-solid-js/compiler-${target}',
                version: '${version}',
                main: '${node_file}',
                os: ['${os}'],
                cpu: ['${cpu}'],
                libc: ['${libc}'],
                files: ['${node_file}'],
              };
              fs.writeFileSync('${package_dir}/package.json', JSON.stringify(pkg, null, 2) + '\\n');
            "
          else
            node -e "
              const fs = require('fs');
              const pkg = {
                name: '@oxc-solid-js/compiler-${target}',
                version: '${version}',
                main: '${node_file}',
                os: ['${os}'],
                cpu: ['${cpu}'],
                files: ['${node_file}'],
              };
              fs.writeFileSync('${package_dir}/package.json', JSON.stringify(pkg, null, 2) + '\\n');
            "
          fi

          tar -czf "dist/oxc-solid-js-compiler-${target}.tar.gz" -C "$package_dir" "$node_file" package.json
        shell: bash
      - name: Upload release tarball
        uses: actions/upload-artifact@v7
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        with:
          name: release-tarball-${{ matrix.settings.target }}
          path: dist/*.tar.gz
          if-no-files-found: error
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.node"
          if-no-files-found: error
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.wasm"
          if-no-files-found: error
  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
        node:
          - "20"
          - "22"
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          architecture: ${{ matrix.settings.architecture }}
      - name: Install dependencies
        run: pnpm install
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Skip JS binding tests
        run: node -e "console.log('Skipping JS binding tests')"
  test-linux-binding:
    name: Test ${{ matrix.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
        node:
          - "20"
          - "22"
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Output docker params
        id: docker
        run: |
          node -e "
            if ('${{ matrix.target }}'.startsWith('aarch64')) {
              console.log('PLATFORM=linux/arm64')
            } else if ('${{ matrix.target }}'.startsWith('armv7')) {
              console.log('PLATFORM=linux/arm/v7')
            } else {
              console.log('PLATFORM=linux/amd64')
            }
          " >> $GITHUB_OUTPUT
          node -e "
            if ('${{ matrix.target }}'.endsWith('-musl')) {
              console.log('IMAGE=node:${{ matrix.node }}-alpine')
            } else {
              console.log('IMAGE=node:${{ matrix.node }}-slim')
            }
          " >> $GITHUB_OUTPUT
          echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - name: Install dependencies
        run: pnpm install --force
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.target }}
          path: .
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: ${{ contains(matrix.target, 'armv7') }}
        with:
          platforms: all
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        if: ${{ contains(matrix.target, 'armv7') }}
      - name: Skip JS binding tests
        uses: tj-actions/docker-run@v2
        with:
          image: ${{ steps.docker.outputs.IMAGE }}
          name: test-binding
          options: "-v ${{ steps.docker.outputs.PNPM_STORE_PATH }}:${{ steps.docker.outputs.PNPM_STORE_PATH }} -v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }} --platform ${{ steps.docker.outputs.PLATFORM }}"
          args: node -e "console.log('Skipping JS binding tests')"
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-macOS-windows-binding
      - test-linux-binding
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Download binding artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          merge-multiple: true
          path: artifacts
      - name: create npm dirs
        run: pnpm napi create-npm-dirs
      - name: Move artifacts
        run: pnpm artifacts
      - name: Download release tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: release-tarball-*
          merge-multiple: true
          path: release-assets
      - name: Build workspace packages
        run: pnpm --filter "@oxc-solid-js/vite" --filter "@oxc-solid-js/rolldown" build
      - name: Pack compiler meta tarball
        run: |
          set -euo pipefail
          mkdir -p release-assets release-assets/compiler-meta/package
          version="$(node -p "require('./package.json').version")"
          repo="${{ github.repository }}"
          base_url="https://github.com/${repo}/releases/download/v${version}"

          node -e "
            const fs = require('fs');
            const root = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const version = '${version}';
            const baseUrl = '${base_url}';
            const pkg = {
              ...root,
              optionalDependencies: {
                '@oxc-solid-js/compiler-darwin-x64': baseUrl + '/oxc-solid-js-compiler-x86_64-apple-darwin.tar.gz',
                '@oxc-solid-js/compiler-darwin-arm64': baseUrl + '/oxc-solid-js-compiler-aarch64-apple-darwin.tar.gz',
                '@oxc-solid-js/compiler-linux-x64-gnu': baseUrl + '/oxc-solid-js-compiler-x86_64-unknown-linux-gnu.tar.gz',
                '@oxc-solid-js/compiler-win32-x64-msvc': baseUrl + '/oxc-solid-js-compiler-x86_64-pc-windows-msvc.tar.gz'
              },
            };
            delete pkg.devDependencies;
            delete pkg.scripts;
            delete pkg.napi;
            pkg.version = version;
            fs.writeFileSync('release-assets/compiler-meta/package/package.json', JSON.stringify(pkg, null, 2) + '\\n');
          "

          cp index.js index.d.ts release-assets/compiler-meta/package/
          tar -czf release-assets/oxc-solid-js-compiler.tgz -C release-assets/compiler-meta package
      - name: Pack Vite plugin tarball
        run: |
          set -euo pipefail
          mkdir -p release-assets
          vite_version="$(node -p "require('./packages/vite/package.json').version")"
          pnpm --filter "@oxc-solid-js/vite" pack --pack-destination release-assets
          mv "release-assets/oxc-solid-js-vite-${vite_version}.tgz" "release-assets/oxc-solid-js-vite-v${vite_version}.tar.gz"
      - name: Pack Rolldown plugin tarball
        run: |
          set -euo pipefail
          mkdir -p release-assets
          rolldown_version="$(node -p "require('./packages/rolldown/package.json').version")"
          pnpm --filter "@oxc-solid-js/rolldown" pack --pack-destination release-assets
          mv "release-assets/oxc-solid-js-rolldown-${rolldown_version}.tgz" "release-assets/oxc-solid-js-rolldown-v${rolldown_version}.tar.gz"
      - name: List packages
        run: ls -R ./npm
        shell: bash
      - name: List release assets
        run: ls -R ./release-assets
        shell: bash
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.tgz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
